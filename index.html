<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Details- Home Page</title>
    <meta name="google-site-verification" content="8uFIXW8Q2zLFDcA9RrQA5yOwcTGrCSAkz0RFeSuO21I" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-blue">
  <div class="container-fluid text-white">
    <div class="logo d-flex align-items-center">
        <i class="bi bi-cloud-sun-fill me-3 fs-2"></i>
        <a class="navbar-brand text-white fs-4">Weather Dashboard</a>
    </div>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item d-flex align-items-center">
          <a class="nav-link active navbar-brand text-white fs-5" aria-current="page" href="index.html">Home</a>
          <i class="me-5 bi bi-brightness-high-fill fs-5"></i>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container-fluid">
  <div class="content d-flex justify-content-center align-items-center flex-column">
    <h3 class="mt-3 text-white fs-2">Check the Weather</h3>
    <p class="mt-1 text-white fs-5">Get real-time weather information for any city in the World.</p>
    <div class="row search d-flex align-items-center justify-content-center bg-white">
        <div class="input-group">
          <i class="bi bi-geo-alt-fill fs-4 p-2"></i>
          <input type="text" class="form-control" placeholder="Enter city name" aria-label="Username" aria-describedby="visible-addon">
          <i class="bi bi-search fs-4 p-2 text-center"></i>
        </div>
   </div>
    
  <div class="row main-section mt-4 mb-2 degree-sec d-flex justify-content-center align-items-center">
      <div class="col-lg-4 col-md-6 col-sm-8 col-12 text-white">
        <div class=" degree p-3">
          <h3 class="city"></h3>
          <p class="current-day"></p>
          <div class="d-flex"><p class="display-4  fw-bold temp"></p>
            <img class="icon-main" src="">
          </div>
          <p class="fw-bold fs-4 condition"></p>
          <span class="rounded-4 feels"></span>
        </div>
        <div class="bg-white day-forcast rounded-4 mt-2 p-3 text-dark mb-2">
          <p class="fs-6">3 Day forecasting</p>
          <div class="d-flex justify-content-evenly">
            <div class="forecasting-days" id="1">
              <h6 class="day1" ></h6>
                <img class="icon1" src="">
                <h6 class="fs-2 day1-temp"></h6>
            </div>
          <div class="vr"></div>
            <div class="forecasting-days" id="2">
              <h6 class="day2"></h6>
                <img class="icon2" src="">
                <h6 class="fs-2 day2-temp"></h6>
            </div>
          <div class="vr"></div>
            <div class="forecasting-days" id="3">
              <h6 class="day3"></h6>
                <img class="icon3" src="">
                <h6 class="fs-2 day3-temp"></h6>
            </div>
          </div>
        </div>
    </div>
      <div class="col-lg-3 col-md-4 col-sm-8 col-11 p-3 infrmation bg-white rounded-4 justify-content-evenly d-flex flex-column">
        <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-moisture text-primary me-2 fs-5"></i>
            <p>Humidity</p>
          </div>
          <h6 class="humidity">N/A</h6>
        </div>
        <hr style="margin:0px">
      <div class="d-flex ">
            <div class="d-flex name">
              <i class="bi bi-wind me-2 fs-5"></i>
              <p>Wind speed</p>
            </div>
            <h6 class="wind-speed">N/A</h6>
          </div>
      <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-sunrise-fill me-2 text-warning fs-5"></i>
            <p>Sunrise</p>
          </div>
          <h6 class="sunrise">N/A</h6>
      </div>
    <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-sunset-fill me-2 text-warning fs-5"></i>
            <p>Sunset</p>
          </div>
          <h6 class="sunset">N/A</h6>
      </div>
    <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-speedometer2 text-danger me-2 fs-5"></i>
            <p>Pressure</p>
          </div>
          <h6 class="pressure">N/A</h6>
        </div>
        <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-cloud-drizzle-fill text-primary me-2 fs-5"></i>
            <p>Rain possibility</p>
          </div>
          <h6 class="rain">N/A</h6>
        </div>
        <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-tornado me-2 fs-5"></i>
            <p>Wind direction</p>
          </div>
          <h6 class="winddir">N/A</h6>
        </div>
        <hr style="margin:0px">
      <div class="d-flex ">
          <div class="d-flex name">
            <i class="bi bi-fire me-2 text-warning fs-5"></i>
            <p>Heat Index</p>
          </div>
          <h6 class="heat text-left">N/A</h6>
        </div>
      </div>
    </div>
</div>
</div>
<footer class="h-10 d-flex justify-content-center">
    <p class="mt-3 text-white">Copyright @ weather dashboard 2026</p>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
